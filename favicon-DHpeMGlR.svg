<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="blueGradient" x1="0" y1="0" x2="1024" y2="1024">
      <stop offset="0%" stop-color="#4DA3FF"/>
      <stop offset="50%" stop-color="#2563FF"/>
      <stop offset="100%" stop-color="#1E40FF"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer Border -->
  <rect
    x="10"
    y="10"
    width="1004"
    height="1004"
    rx="90"
    fill="black"
    stroke="url(#blueGradient)"
    stroke-width="20"
  />

  <!-- Text -->
  <text
    x="512"
    y="610"
    text-anchor="middle"
    font-family="Arial Black, sans-serif"
    font-size="240"
    fill="white"
    stroke="url(#blueGradient)"
    stroke-width="10"
    filter="url(#glow)"
    letter-spacing="-8"
  >
    AndQA
  </text>

</svg>

